bundle:
  name: "claude_otel_session_scorer"

artifacts:
  claude_otel_session_scorer:
    type: whl
    build: poetry build
    path: .

resources:
  jobs:
    claude_otel_session_scorer_job:
      name: "Claude OTEL Session Scorer Job"
      tasks:
        - task_key: "main_task"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "main"
            named_parameters:
              table-name: "your_catalog.your_schema.your_table"
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            client: "5"
            dependencies:
              - ./dist/*.whl

    silver_etl_job:
      name: "Claude OTEL Silver ETL Job"
      tasks:
        - task_key: "silver_etl_task"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "silver_etl"
            named_parameters:
              source-catalog: "your_catalog"
              source-schema: "claude"
              target-catalog: "your_catalog"
              target-schema: "claude_silver"
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            client: "5"
            dependencies:
              - ./dist/*.whl

    score_sessions_job:
      name: "Claude OTEL Score Sessions Job"
      tasks:
        - task_key: "score_sessions_task"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "score_sessions"
            named_parameters:
              target-catalog: "your_catalog"
              target-schema: "claude_silver"
              gold-schema: "your_catalog.claude_gold"
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            client: "5"
            dependencies:
              - ./dist/*.whl

targets:
  dev:
    default: true
