bundle:
  name: "claude_otel_session_scorer"

artifacts:
  claude_otel_session_scorer:
    type: whl
    build: poetry build
    path: .

resources:
  jobs:
    otel_pipeline_job:
      name: "Claude OTEL Pipeline"
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      parameters:
        - name: bronze_schema
          default: "tanner_fevm_catalog.claude"
        - name: silver_schema
          default: "tanner_fevm_catalog.claude_silver"
        - name: gold_schema
          default: "tanner_fevm_catalog.claude_gold"
      tasks:
        - task_key: "silver_etl"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "silver_etl"
            named_parameters:
              bronze-schema: "{{job.parameters.bronze_schema}}"
              silver-schema: "{{job.parameters.silver_schema}}"
          environment_key: Default
        - task_key: "score_sessions"
          depends_on:
            - task_key: "silver_etl"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "score_sessions"
            named_parameters:
              silver-schema: "{{job.parameters.silver_schema}}"
              gold-schema: "{{job.parameters.gold_schema}}"
          environment_key: Default
        - task_key: "score_human_signals"
          depends_on:
            - task_key: "silver_etl"
          python_wheel_task:
            package_name: "claude_otel_session_scorer"
            entry_point: "score_human_signals"
            named_parameters:
              silver-schema: "{{job.parameters.silver_schema}}"
              gold-schema: "{{job.parameters.gold_schema}}"
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            client: "5"
            dependencies:
              - ./dist/*.whl

targets:
  dev:
    default: true
